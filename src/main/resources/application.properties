# ================================
# Application
# ================================
spring.application.name=finance-backend
server.port=8080

# Load environment variables from .env file
spring.config.import=optional:file:.env[.properties]

# ================================
# Database - MySQL
# ================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:finance_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT (WARNING: Always set JWT_SECRET env variable in production!)
# ================================
app.jwt.secret=${JWT_SECRET:fallback_secret_key_change_in_production_for_security}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ================================
# CORS
# ================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ================================
# Swagger / OpenAPI
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# SQL Init (for seeding default admin)
# ================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ================================
# Logging
# ================================
logging.level.com.financeapp=INFO
logging.level.org.springframework.security=WARN
